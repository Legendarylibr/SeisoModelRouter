# Local stack (default): router + llama-swap + 3 llama.cpp specialists
#
#   cd deploy/model-router
#   docker compose -f docker-compose.local.yml up --build
#
# Place GGUF files under MODEL_CACHE_DIR (default ../../models) and set SEISO_*_GGUF.
# For vLLM local stack instead: docker compose -f docker-compose.local.vllm.yml up --build
#
# Router:     http://127.0.0.1:8780/v1/chat/completions
# llama-swap: http://127.0.0.1:8080 (internal orchestrator)

x-llama-env: &llama_env
  LLAMA_ARG_HOST: "0.0.0.0"
  LLAMA_ARG_PORT: "8080"

x-llama-base: &llama_base
  image: ghcr.io/ggml-org/llama.cpp:server
  restart: unless-stopped
  volumes:
    - ${MODEL_CACHE_DIR:-../../models}:/models:ro
  environment:
    <<: *llama_env
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
    interval: 30s
    timeout: 10s
    retries: 10
    start_period: 60s

services:
  router:
    build:
      context: ../../
      dockerfile: deploy/model-router/Dockerfile
    restart: unless-stopped
    ports:
      - "8780:8780"
    environment:
      SEISO_ROUTER_CONFIG_PATH: deploy/model-router/config/router.local.yaml
      SEISO_ROUTER_LLAMASWAP_URL: http://llama-swap:8080
    volumes:
      - router_data:/app/data/router
    depends_on:
      llama-swap:
        condition: service_started
      llama-general:
        condition: service_healthy
    networks:
      - seiso-router

  llama-swap:
    image: ghcr.io/mostlygeek/llama-swap:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config/llama-swap.local.llamacpp.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--listen", ":8080"]
    depends_on:
      llama-general:
        condition: service_healthy
      llama-code:
        condition: service_healthy
      llama-reasoning:
        condition: service_healthy
    networks:
      - seiso-router

  llama-general:
    <<: *llama_base
    container_name: seiso-llama-general
    command:
      - --model
      - ${SEISO_GENERAL_GGUF:-/models/general-q4_k_m.gguf}
      - --alias
      - seiso-general
      - -ngl
      - "${N_GPU_LAYERS:-99}"
    networks:
      - seiso-router

  llama-code:
    <<: *llama_base
    container_name: seiso-llama-code
    command:
      - --model
      - ${SEISO_CODE_GGUF:-/models/code-q4_k_m.gguf}
      - --alias
      - seiso-code
      - -ngl
      - "${N_GPU_LAYERS:-99}"
    networks:
      - seiso-router

  llama-reasoning:
    <<: *llama_base
    container_name: seiso-llama-reasoning
    command:
      - --model
      - ${SEISO_REASONING_GGUF:-/models/reasoning-q4_k_m.gguf}
      - --alias
      - seiso-reasoning
      - -ngl
      - "${N_GPU_LAYERS:-99}"
    networks:
      - seiso-router

volumes:
  router_data:

networks:
  seiso-router:
    driver: bridge
