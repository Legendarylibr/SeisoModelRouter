# llama-swap local config — llama.cpp (llama-server) specialists
# Place GGUF files under MODEL_CACHE_DIR and set SEISO_*_GGUF paths in compose.
# llama-swap TTL unloads idle models (no vLLM-style sleep API).

listen: ":8080"

models:
  seiso-general:
    proxy: http://llama-general:8080
    checkEndpoint: /health
    ttl: 3600
    cmd: |
      while ! curl -sf http://llama-general:8080/health; do sleep 2; done; sleep infinity

  seiso-code:
    proxy: http://llama-code:8080
    checkEndpoint: /health
    ttl: 3600
    cmd: |
      while ! curl -sf http://llama-code:8080/health; do sleep 2; done; sleep infinity

  seiso-reasoning:
    proxy: http://llama-reasoning:8080
    checkEndpoint: /health
    ttl: 900
    cmd: |
      while ! curl -sf http://llama-reasoning:8080/health; do sleep 2; done; sleep infinity
