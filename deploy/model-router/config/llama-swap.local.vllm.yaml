# llama-swap local config — vLLM backends with sleep mode level 1
listen: ":8080"

hooks:
  onModelLoaded:
    - sh
    - -c
    - "curl -sf -X POST \"${PROXY}/wake_up\" || true"
  onModelUnload:
    - sh
    - -c
    - "curl -sf -X POST \"${PROXY}/sleep?level=1\" || curl -sf -X POST \"${PROXY}/sleep\" -d '{\"level\":\"1\"}' || true"

models:
  seiso-general:
    proxy: http://vllm-general:8000
    checkEndpoint: /health
    ttl: 86400
    cmd: |
      while ! curl -sf http://vllm-general:8000/health; do sleep 2; done; sleep infinity
    env:
      PROXY: http://vllm-general:8000

  seiso-code:
    proxy: http://vllm-code:8000
    checkEndpoint: /health
    ttl: 86400
    cmd: |
      while ! curl -sf http://vllm-code:8000/health; do sleep 2; done; sleep infinity
    env:
      PROXY: http://vllm-code:8000

  seiso-reasoning:
    proxy: http://vllm-reasoning:8000
    checkEndpoint: /health
    ttl: 3600
    cmd: |
      while ! curl -sf http://vllm-reasoning:8000/health; do sleep 2; done; sleep infinity
    env:
      PROXY: http://vllm-reasoning:8000
