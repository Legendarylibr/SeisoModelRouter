# Local stack — vLLM specialists + Nemotron-Orchestrator-8B (all with sleep mode level 1)
#
#   cd deploy/model-router
#   docker compose -f docker-compose.local.vllm.yml up --build
#
# Router:     http://127.0.0.1:8780/v1/chat/completions
# llama-swap: http://127.0.0.1:8080
#
# Nemotron orchestrator routing requires inference_backend=vllm and vllm_sleep_mode=true
# (see config/router.local.vllm.yaml).

x-vllm-env: &vllm_env
  VLLM_SERVER_DEV_MODE: "1"
  HF_HOME: /models/cache

x-vllm-base: &vllm_base
  image: vllm/vllm-openai:latest
  restart: unless-stopped
  volumes:
    - ${MODEL_CACHE_DIR:-../../models}:/models/cache
  environment:
    <<: *vllm_env
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
    interval: 30s
    timeout: 10s
    retries: 10
    start_period: 120s

services:
  router:
    build:
      context: ../../
      dockerfile: deploy/model-router/Dockerfile
    restart: unless-stopped
    ports:
      - "8780:8780"
    environment:
      SEISO_ROUTER_CONFIG_PATH: deploy/model-router/config/router.local.vllm.yaml
      SEISO_ROUTER_LLAMASWAP_URL: http://llama-swap:8080
    volumes:
      - router_data:/app/data/router
    depends_on:
      llama-swap:
        condition: service_started
      vllm-general:
        condition: service_healthy
      vllm-orchestrator:
        condition: service_healthy
    networks:
      - seiso-router

  llama-swap:
    image: ghcr.io/mostlygeek/llama-swap:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config/llama-swap.local.vllm.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--listen", ":8080"]
    depends_on:
      vllm-general:
        condition: service_healthy
      vllm-code:
        condition: service_healthy
      vllm-reasoning:
        condition: service_healthy
      vllm-orchestrator:
        condition: service_healthy
    networks:
      - seiso-router

  vllm-orchestrator:
    <<: *vllm_base
    container_name: seiso-vllm-orchestrator
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --model
      - ${SEISO_ORCHESTRATOR_MODEL:-nvidia/Nemotron-Orchestrator-8B}
      - --served-model-name
      - seiso-orchestrator
      - --enable-sleep-mode
      - --gpu-memory-utilization
      - "0.45"
      - --max-model-len
      - "8192"
    networks:
      - seiso-router

  vllm-general:
    <<: *vllm_base
    container_name: seiso-vllm-general
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --model
      - ${SEISO_GENERAL_MODEL:-Qwen/Qwen2.5-0.5B-Instruct}
      - --served-model-name
      - seiso-general
      - --enable-sleep-mode
      - --gpu-memory-utilization
      - "0.40"
      - --max-model-len
      - "4096"
    networks:
      - seiso-router

  vllm-code:
    <<: *vllm_base
    container_name: seiso-vllm-code
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --model
      - ${SEISO_CODE_MODEL:-Qwen/Qwen2.5-Coder-0.5B-Instruct}
      - --served-model-name
      - seiso-code
      - --enable-sleep-mode
      - --gpu-memory-utilization
      - "0.40"
      - --max-model-len
      - "8192"
    networks:
      - seiso-router

  vllm-reasoning:
    <<: *vllm_base
    container_name: seiso-vllm-reasoning
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --model
      - ${SEISO_REASONING_MODEL:-Qwen/Qwen2.5-1.5B-Instruct}
      - --served-model-name
      - seiso-reasoning
      - --enable-sleep-mode
      - --gpu-memory-utilization
      - "0.35"
      - --max-model-len
      - "8192"
    networks:
      - seiso-router

volumes:
  router_data:

networks:
  seiso-router:
    driver: bridge
